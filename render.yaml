services:
  - type: web
    name: nemoforge-backend
    env: node
    region: ohio
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_SECRET
        generateValue: true
      - key: NEMOCLAW_API_KEY
        sync: false
      - key: BRIGHTDATA_WS_ENDPOINT
        sync: false
      - key: BRIGHTDATA_PROXY_URL
        sync: false
